spring.application.name=order-processing-app
# ============================================================
#  application.properties
#  Central configuration for Order Processing System
# ============================================================
#  Environment variables (DB_URL, DB_USER, DB_PASS, JWT_SECRET)
#  are injected via docker-compose.yml or a .env file.
#  The values after the colon (:) are LOCAL DEVELOPMENT defaults.
# ============================================================



server.port=8085
# All endpoints are prefixed: e.g. POST /api/auth/register
server.servlet.context-path=/api


# ?? DataSource (PostgreSQL) ??????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
# Keep 2 warm connections, allow burst up to 10
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000


# JPA / Hibernate
# ddl-auto options:
#   create       -> DROP + CREATE tables on every startup (use for first run)
#   update       -> ALTER tables to match entities (use during development)
#   validate     -> check schema matches entities, fail if not (use in production)
#   none         -> do nothing (use in production with Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Show generated SQL in logs (disable in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent "could not initialize proxy ? no Session" errors.
# Keeps Hibernate Session open for the duration of the HTTP request.
spring.jpa.open-in-view=false


# ?? Jackson (JSON serialization) ?????????????????????????????
# Return dates as "2024-01-15T10:30:00" strings, not epoch milliseconds
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC


# ?? JWT Configuration ????????????????????????????????????????
# Secret key for signing HS256 JWT tokens.
# MUST be at least 256 bits (32 characters) for HS256 algorithm.
# In production: always inject via environment variable, NEVER hardcode.
jwt.secret=c68275f926f47e1436ba6fd8ad40c040

# Token validity in milliseconds: 86400000 = 24 hours
jwt.expiration=86400000


# ?? Logging ??????????????????????????????????????????????????
logging.level.com.project.order_processing_app=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE